<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuvem de Dados</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        const raindrops = [];
        const splashes = [];

        // Configurações da Nuvem
        const cloudParticles = [];
        for (let i = 0; i < 60; i++) {
            cloudParticles.push({
                x: (Math.random() - 0.5) * 400 + canvas.width / 2,
                y: (Math.random() - 0.5) * 100 + 150,
                radius: Math.random() * 50 + 40,
                opacity: Math.random() * 0.3 + 0.1
            });
        }

        class RainDrop {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = (Math.random() - 0.5) * 350 + canvas.width / 2;
                this.y = 150 + Math.random() * 50;
                this.char = characters.charAt(Math.floor(Math.random() * characters.length));
                this.speed = Math.random() * 4 + 3;
                this.fontSize = Math.random() * 12 + 10;
            }

            update() {
                this.y += this.speed;

                // Se atingir o "chão" (80% da tela)
                if (this.y > canvas.height * 0.8) {
                    createSplash(this.x, canvas.height * 0.8);
                    this.reset();
                }
            }

            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.font = `${this.fontSize}px monospace`;
                ctx.fillText(this.char, this.x, this.y);
            }
        }

        class Splash {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 2;
                this.opacity = 1;
            }

            update() {
                this.radius += 2;
                this.opacity -= 0.03;
            }

            draw() {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(0, 150, 255, ${this.opacity})`; // Azul do respingo
                ctx.lineWidth = 2;
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.3, 0, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function createSplash(x, y) {
            splashes.push(new Splash(x, y));
        }

        // Inicializa chuva
        for (let i = 0; i < 50; i++) {
            raindrops.push(new RainDrop());
        }

        function drawCloud() {
            // Efeito Fog/Glow da nuvem
            ctx.shadowBlur = 40;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.2)';
            
            cloudParticles.forEach(p => {
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${p.opacity})`);
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            
            ctx.shadowBlur = 0; // Reseta o blur para a chuva não ficar pesada
        }

        function animate() {
            // Limpa a tela com rastro leve para movimento
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawCloud();

            raindrops.forEach(drop => {
                drop.update();
                drop.draw();
            });

            splashes.forEach((splash, index) => {
                splash.update();
                splash.draw();
                if (splash.opacity <= 0) splashes.splice(index, 1);
            });

            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
