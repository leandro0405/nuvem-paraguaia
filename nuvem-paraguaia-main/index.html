<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nuvem Realista - Chuva de Dados</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

<script>
let particles = [];
let cloudBlobs = [];

function setup() {
    createCanvas(windowWidth, windowHeight);
    
    // Criando a estrutura da nuvem (vários círculos suaves para dar volume)
    for (let i = 0; i < 40; i++) {
        cloudBlobs.push({
            x: width / 2 + random(-100, 100),
            y: 100 + random(-30, 30),
            size: random(60, 120),
            opacity: random(100, 200),
            offset: random(1000)
        });
    }
}

function draw() {
    background(0, 40); // Rastro leve para suavizar o movimento

    // 1. Efeito de Chão / Reflexo
    drawFloor();

    // 2. Atualizar e Desenhar a Chuva (Letras e Números)
    if (random(1) > 0.85) {
        particles.push(new Particle());
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].display();
        if (particles[i].finished()) {
            particles.splice(i, 1);
        }
    }

    // 3. Desenhar a Nuvem Realista com Efeito "Fog" (Névoa)
    drawCloud();
}

function drawCloud() {
    push();
    noStroke();
    // Efeito de névoa interna
    for (let blob of cloudBlobs) {
        // Movimento sutil orgânico
        let noiseX = map(noise(blob.offset + frameCount * 0.01), 0, 1, -20, 20);
        
        // Camadas de transparência para parecer fumaça/névoa
        for (let j = 5; j > 0; j--) {
            fill(255, 255, 255, blob.opacity / j / 2);
            ellipse(blob.x + noiseX, blob.y, blob.size + j * 10);
        }
    }
    pop();
}

function drawFloor() {
    stroke(30, 30, 80);
    line(0, height - 100, width, height - 100);
}

class Particle {
    constructor() {
        this.x = width / 2 + random(-120, 120);
        this.y = 100;
        this.vel = random(4, 8);
        this.char = random("ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789".split(""));
        this.size = random(12, 20);
        this.hitGround = false;
        this.alpha = 255;
    }

    update() {
        if (!this.hitGround) {
            this.y += this.vel;
        }

        // Checar se bateu no "chão"
        if (this.y >= height - 100 && !this.hitGround) {
            this.hitGround = true;
            this.y = height - 100;
        }

        if (this.hitGround) {
            this.alpha -= 10; // Sumir após o impacto
        }
    }

    display() {
        // Desenha a letra/número caindo
        fill(0, 150, 255, this.alpha);
        textSize(this.size);
        textAlign(CENTER);
        text(this.char, this.x, this.y);

        // Desenha o Reflexo no chão
        if (this.y > height - 150) {
            fill(0, 100, 255, this.alpha * 0.3); // Reflexo mais fraco
            push();
            translate(this.x, height - 100 + (height - 100 - this.y));
            scale(1, -0.8); // Inverte verticalmente e achata
            text(this.char, 0, 0);
            pop();
        }
    }

    finished() {
        return this.alpha < 0;
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
